# Render Blueprint for grok2api
# https://render.com/docs/blueprint-spec
#
# 使用前：
# 1. 把此文件放到你的 grok2api fork 仓库根目录
# 2. 准备好填了真实敏感值的 config.yaml（参考 config.example.yaml）
# 3. 在 Render Dashboard 创建 Blueprint，指定此仓库
# 4. Render 创建服务后，手动在 Environment → Secret Files 中添加：
#    - Filename: config.yaml
#    - Contents: 粘贴你完整的 config.yaml 内容
#    - Mount path: /run/grok2api

services:
  - type: web
    name: grok2api
    runtime: image
    image:
      context: .
      dockerfilePath: Dockerfile
    plan: free

    healthCheckPath: /healthz
    port: 8000

    # Secret File 自动注入 /run/grok2api/config.yaml
    # entrypoint.sh 检测到后将其 cp 至 /app/config.yaml
    secretFiles:
      - name: config
        mountPath: /run/grok2api

    # SQLite 数据库必须持久化，否则重启丢全部账号与数据
    disk:
      name: grok2api-data
      mountPath: /app/data
      sizeGB: 1

    # 可选的运行时环境变量
    envVars:
      - key: TZ
        value: Asia/Shanghai
